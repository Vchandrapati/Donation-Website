<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D20 Fundraiser — Schedule</title>
  <style>
    @font-face {
      font-family: 'Aeromove';
      src: url('__AEROMOVE_FONT__') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg:     #0a0a14;
      --surface:#13131c;
      --border: #1e1e2e;
      --text:   #ffffff;
      --muted:  #4a4a5a;
      --gold:   #f7c26a;
      --purple: #7c6af7;
      --blue:   #29b8e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #0a0a14;
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    .clock {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 3rem;
      line-height: 80px;
      color: #ffffff;
      white-space: nowrap;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .header-title {
      font-family: 'Aeromove', 'Segoe UI', sans-serif;
      font-size: 4.2rem;
      line-height: 80px;
      color: var(--blue);
      text-shadow: 0 0 36px #29b8e840;
      white-space: nowrap;
      text-align: center;
    }

    /* ── Main: single centered column ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 64px;
      overflow-y: auto;
      gap: 0;
    }

    /* ── Total block ── */
    .total-block {
      text-align: center;
      margin-bottom: 44px;
    }

    .total-label {
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .total-amount {
      font-size: 5.5rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* ── Schedule block ── */
    .schedule-block {
      width: 100%;
      max-width: 820px;
    }

    .schedule-heading {
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ffffff;
      margin-bottom: 20px;
      text-align: center;
    }

    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sched-row {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 16px 24px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .sched-row.current {
      background: #12101e;
      border-color: var(--purple);
      box-shadow: 0 0 0 1px #7c6af722, 0 4px 28px #7c6af718;
    }

    .sched-row.upcoming {
      background: var(--surface);
      border-color: var(--border);
    }

    .sched-time {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      min-width: 86px;
      white-space: nowrap;
    }

    .sched-row.current .sched-time {
      color: var(--purple);
    }

    .sched-event {
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffffff;
      flex: 1;
    }

    .sched-row.leaving {
      overflow: hidden;
      opacity: 0;
      max-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      margin: 0 !important;
      border-width: 0 !important;
      transition: opacity 0.35s ease, max-height 0.35s ease, padding 0.35s ease, border-width 0.35s ease;
    }

    .now-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--purple);
      background: #7c6af718;
      border: 1px solid #7c6af740;
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="clock"><span id="clockFace">--:--:-- --</span></div>
  <div class="header-title">DARE TO DREAM</div>
  <div></div>
</header>

<div class="main">

  <div class="total-block">
    <div class="total-label">Total Raised</div>
    <div class="total-amount" id="grandTotal">$—</div>
  </div>

  <div class="schedule-block">
    <div class="schedule-heading">Tonight's Schedule</div>
    <div class="schedule-list" id="scheduleList"></div>
  </div>

</div>

<script>
  const SB_URL   = '__SUPABASE_URL__';
  const SB_KEY   = '__SUPABASE_KEY__';
  const SCHEDULE = __SCHEDULE_DATA__;

  // ── Clock ─────────────────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    let h     = now.getHours();
    const ap  = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('clockFace').textContent =
      `${pad(h)}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${ap}`;
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ── Schedule ──────────────────────────────────────────────────────────────
  function parseEventTime(t) {
    const m = t.match(/^(\d+):(\d+)(am|pm)$/i);
    if (!m) return null;
    let h = parseInt(m[1], 10);
    const min = parseInt(m[2], 10);
    if (m[3].toLowerCase() === 'pm' && h !== 12) h += 12;
    if (m[3].toLowerCase() === 'am' && h === 12) h = 0;
    return h * 60 + min;
  }

  function nowMinutes() {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  }

  const TIMES = SCHEDULE.map(e => parseEventTime(e.time));
  let prevCur = -2;

  function currentIdx() {
    const now = nowMinutes();
    let cur = -1;
    for (let i = TIMES.length - 1; i >= 0; i--) {
      if (TIMES[i] !== null && now >= TIMES[i]) { cur = i; break; }
    }
    return cur;
  }

  function buildList(cur) {
    const list = document.getElementById('scheduleList');
    const items = cur < 0 ? SCHEDULE : SCHEDULE.slice(cur);
    list.innerHTML = items.map((e, i) => {
      const isCur = i === 0 && cur >= 0;
      return `<div class="sched-row ${isCur ? 'current' : 'upcoming'}">
        <span class="sched-time">${e.time}</span>
        <span class="sched-event">${e.event}</span>
        ${isCur ? '<span class="now-badge">Now</span>' : ''}
      </div>`;
    }).join('');
    document.querySelector('.main').scrollTo({ top: 0, behavior: 'smooth' });
    prevCur = cur;
  }

  function renderSchedule() {
    const cur = currentIdx();

    // Event just ended — animate the current row out, then rebuild
    if (prevCur >= 0 && cur > prevCur) {
      const curRow = document.querySelector('.sched-row.current');
      if (curRow) {
        curRow.style.maxHeight = curRow.offsetHeight + 'px';
        requestAnimationFrame(() => curRow.classList.add('leaving'));
        setTimeout(() => buildList(cur), 370);
        return;
      }
    }

    buildList(cur);
  }

  renderSchedule();
  setInterval(renderSchedule, 30000);

  // ── Total ─────────────────────────────────────────────────────────────────
  async function fetchTotal() {
    try {
      const h = new Headers();
      h.set('apikey', SB_KEY);
      h.set('Authorization', `Bearer ${SB_KEY}`);
      const res  = await fetch(`${SB_URL}/rest/v1/teams?select=total`, { headers: h });
      const data = await res.json();
      const sum  = data.reduce((s, t) => s + Number(t.total || 0), 0);
      document.getElementById('grandTotal').textContent = '$' + sum.toLocaleString();
    } catch { /* silent */ }
  }

  fetchTotal();
  setInterval(fetchTotal, 15000);
</script>
</body>
</html>
