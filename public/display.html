<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070d;
      --surface: #0e0e18;
      --border:  #2a2a40;
      --accent:  #7c6af7;
      --gold:    #f7c26a;
      --green:   #34d399;
      --text:    #f0f0f8;
      --muted:   #8888a8;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100%;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      background: #0a0a14;
    }

    .header-left h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .header-left .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 500;
    }

    .live-badge {
      background: #34d39918;
      border: 1px solid #34d39950;
      border-radius: 20px;
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: center;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.7); }
    }

    .header-right { text-align: right; }
    .header-right .total-amount {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -1px;
      display: block;
      line-height: 1;
    }
    .header-right .total-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
      display: block;
      font-weight: 600;
    }

    /* ── Body ── */
    .body {
      display: grid;
      grid-template-columns: 1fr 560px;
      min-height: 0;
    }

    /* ── Chart panel ── */
    .chart-panel {
      padding: 28px 36px 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--border);
    }

    .panel-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: 18px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* ── Ranking panel ── */
    .ranking-panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 28px 28px;
      border-left: 1px solid var(--border);
    }

    .rank-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.3s;
    }

    .rank-row:hover { background: #141420; }

    .rank-pos {
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rank-info { flex: 1; min-width: 0; }

    .rank-name {
      font-size: 1.75rem;
      font-weight: 700;
      color: #e8e8f8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .rank-bar-bg {
      background: #1e1e30;
      border-radius: 4px;
      height: 7px;
    }

    .rank-bar-fill {
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 4px;
      height: 7px;
      transition: width 0.7s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    .rank-amount {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--green);
      min-width: 120px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Thank-you overlay ── */
    #thankYou {
      position: fixed; inset: 0;
      background: #07070de0;
      backdrop-filter: blur(12px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s;
    }
    #thankYou.show { opacity: 1; pointer-events: all; }

    #tyCard {
      background: #10101e;
      border: 1px solid #2a2a4a;
      border-radius: 28px;
      padding: 64px 88px;
      text-align: center;
      max-width: 720px; width: 90%;
      transform: scale(0.88);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    #thankYou.show #tyCard { transform: scale(1); }

    /* ── New donation banner ── */
    #donBanner {
      position: fixed;
      top: 28px; left: 50%;
      transform: translateX(-50%) translateY(-180px);
      background: #0e0e1e;
      border: 1px solid #2a2a4a;
      border-left: 6px solid var(--green);
      border-radius: 18px;
      padding: 22px 44px;
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      min-width: 480px;
      text-align: center;
    }
    #donBanner.show { transform: translateX(-50%) translateY(0); }
    #donBanner .b-name   { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    #donBanner .b-team   { font-size: 1.1rem; color: var(--muted); margin-bottom: 8px; }
    #donBanner .b-amount { font-size: 2.4rem; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-left">
      <h1>Donation Leaderboard</h1>
      <div class="subtitle">Live fundraising tracker</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <div class="header-right">
      <span class="total-amount" id="grandTotal">$0</span>
      <span class="total-label">Total raised</span>
    </div>
  </header>

  <div class="body">

    <div class="chart-panel">
      <div class="panel-label">Donations by team</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="ranking-panel">
      <div class="panel-label" style="margin-bottom:16px;">Rankings</div>
      <div class="rank-list" id="rankList"></div>
    </div>

  </div>
</div>

<!-- New donation banner -->
<div id="donBanner">
  <div class="b-name"   id="bName"></div>
  <div class="b-team"   id="bTeam"></div>
  <div class="b-amount" id="bAmount"></div>
</div>

<!-- Thank-you overlay -->
<div id="thankYou">
  <div id="tyCard">
    <div style="font-size:4.5rem; margin-bottom:20px;">🎉</div>
    <div id="tyName"   style="color:#7c6af7; font-size:2.4rem; font-weight:800; margin-bottom:10px;"></div>
    <div id="tyTeam"   style="color:#f7c26a; font-size:2rem; font-weight:700; margin-bottom:14px;"></div>
    <div id="tyAmount" style="color:#34d399; font-size:3.8rem; font-weight:800; letter-spacing:-1px;"></div>
    <div id="tyDesc"   style="color:#5a5a7a; font-size:1.1rem; margin-top:14px; font-style:italic;"></div>
    <div style="color:#4a4a6a; font-size:1rem; margin-top:10px;">Your generosity makes a difference.</div>
  </div>
</div>

<script>
  const SB_URL = '__SUPABASE_URL__';
  const SB_KEY = '__SUPABASE_KEY__';

  let teams = [];
  let chart = null;
  let lastDonationId = null;

  const PALETTE = [
    '#7c6af7','#f7c26a','#34d399','#f87171','#60a5fa',
    '#a78bfa','#fbbf24','#4ade80','#fb923c','#38bdf8',
    '#818cf8','#e879f9','#2dd4bf','#facc15','#94a3b8',
    '#c084fc','#f472b6','#fb7185','#a3e635','#22d3ee',
    '#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899',
  ];

  // ── Supabase helper ────────────────────────────────────────────────────────
  async function sb(path) {
    const h = new Headers();
    h.set('apikey',        SB_KEY);
    h.set('Authorization', `Bearer ${SB_KEY}`);
    h.set('Content-Type',  'application/json');
    const res  = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: h });
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  function sorted() { return [...teams].sort((a,b) => b.total - a.total); }

  // ── Grand total ────────────────────────────────────────────────────────────
  function updateTotal() {
    const t = teams.reduce((s,t) => s + Number(t.total||0), 0);
    document.getElementById('grandTotal').textContent = '$' + t.toLocaleString();
  }

  // ── Chart ──────────────────────────────────────────────────────────────────
  function buildChart() {
    const s = sorted();
    chart = new Chart(document.getElementById('chart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: s.map(t => t.name),
        datasets: [{
          data: s.map(t => t.total),
          backgroundColor: s.map((_,i) => PALETTE[i % PALETTE.length] + 'cc'),
          borderColor:     s.map((_,i) => PALETTE[i % PALETTE.length]),
          borderWidth: 2,
          borderRadius: 8,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a2e',
            borderColor: '#3a3a5a',
            borderWidth: 1,
            titleColor: '#ffffff',
            bodyColor: '#34d399',
            titleFont: { size: 13, weight: 'bold' },
            bodyFont: { size: 14, weight: 'bold' },
            padding: 12,
            callbacks: { label: c => ` $${c.parsed.y.toLocaleString()}` },
          },
        },
        scales: {
          x: {
            grid: { color: '#1e1e30' },
            ticks: {
              color: '#c0c0d8',
              font: { size: 13, weight: '600' },
              maxRotation: 0, minRotation: 0,
            },
          },
          y: {
            grid: { color: '#1e1e30' },
            ticks: {
              color: '#c0c0d8',
              font: { size: 14, weight: '600' },
              callback: v => '$' + v.toLocaleString(),
            },
            beginAtZero: true,
          },
        },
      },
    });
  }

  function updateChart() {
    if (!chart) return;
    const s = sorted();
    chart.data.labels = s.map(t => t.name);
    chart.data.datasets[0].data = s.map(t => t.total);
    chart.update('active');
  }

  // ── Medal icon ─────────────────────────────────────────────────────────────
  function medalIcon(i) {
    const colors = [
      { ring: '#f7c26a', fill: '#2a1f00', text: '#f7c26a' },
      { ring: '#c0c0d8', fill: '#1a1a28', text: '#c0c0d8' },
      { ring: '#c87941', fill: '#200e00', text: '#c87941' },
    ];
    if (i > 2) return `<span style="font-size:1.4rem;font-weight:800;color:#606080;">${i+1}</span>`;
    const { ring, fill, text } = colors[i];
    return `<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" fill="${fill}" stroke="${ring}" stroke-width="2.5"/>
      <text x="20" y="27" text-anchor="middle" font-size="17" font-weight="800"
            font-family="Segoe UI,system-ui,sans-serif" fill="${text}">${i+1}</text>
    </svg>`;
  }

  // ── Ranking ────────────────────────────────────────────────────────────────
  function renderRanking() {
    const s   = sorted();
    const max = s[0]?.total || 1;
    document.getElementById('rankList').innerHTML = s.map((t,i) => {
      const pct = max > 0 ? (t.total / max) * 100 : 0;
      return `
        <div class="rank-row">
          <div class="rank-pos">${medalIcon(i)}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(t.name)}</div>
            <div class="rank-bar-bg">
              <div class="rank-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="rank-amount">$${Number(t.total).toLocaleString()}</div>
        </div>`;
    }).join('');
  }

  // ── Thank-you overlay ──────────────────────────────────────────────────────
  let tyTimer;
  function showTY(donorName, teamName, amount, description) {
    document.getElementById('tyName').textContent   = donorName ? `Thank you ${donorName}` : 'Thank you!';
    document.getElementById('tyTeam').textContent   = teamName;
    document.getElementById('tyAmount').textContent = '$' + Number(amount).toLocaleString();
    document.getElementById('tyDesc').textContent   = description || '';
    document.getElementById('thankYou').classList.add('show');
    fireConfetti();
    clearTimeout(tyTimer);
    tyTimer = setTimeout(dismissTY, 7000);
  }

  function dismissTY() {
    document.getElementById('thankYou').classList.remove('show');
    clearTimeout(tyTimer);
  }

  // ── Donation banner ────────────────────────────────────────────────────────
  let bannerTimer;
  function showBanner(donorName, teamName, amount) {
    document.getElementById('bName').textContent   = donorName ? `Thank you, ${donorName}!` : 'New donation!';
    document.getElementById('bTeam').textContent   = teamName;
    document.getElementById('bAmount').textContent = '+$' + Number(amount).toLocaleString();
    document.getElementById('donBanner').classList.add('show');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => document.getElementById('donBanner').classList.remove('show'), 5000);
  }

  // ── Confetti ───────────────────────────────────────────────────────────────
  function fireConfetti() {
    const c = ['#7c6af7','#f7c26a','#34d399','#f87171','#60a5fa'];
    confetti({ particleCount: 120, spread: 90, origin: { y: 0.5 }, colors: c });
    setTimeout(() => confetti({ particleCount: 70, angle: 60,  spread: 65, origin: { x: 0, y: 0.5 }, colors: c }), 200);
    setTimeout(() => confetti({ particleCount: 70, angle: 120, spread: 65, origin: { x: 1, y: 0.5 }, colors: c }), 360);
  }

  // ── Real-time ──────────────────────────────────────────────────────────────
  function subscribeRealtime() {
    const wsUrl = SB_URL.replace('https://','wss://').replace('http://','ws://');
    const ws = new WebSocket(`${wsUrl}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`);

    ws.onopen = () => ws.send(JSON.stringify({
      topic: 'realtime:public:donations',
      event: 'phx_join',
      payload: { config: {
        broadcast: { self: false },
        presence: { key: '' },
        postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'donations' }],
      }},
      ref: '1',
    }));

    ws.onmessage = async (msg) => {
      const p = JSON.parse(msg.data);
      const rec = p.payload?.data?.record;
      if (rec && rec.id !== lastDonationId) {
        lastDonationId = rec.id;
        try {
          teams = await sb('teams?order=total.desc');
          updateChart(); renderRanking(); updateTotal();
          showBanner(rec.donor_name, rec.team_name, rec.amount);
          showTY(rec.donor_name, rec.team_name, rec.amount, rec.description);
        } catch(_) {}
      }
    };

    setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: null }));
      }
    }, 25000);
  }

  function startPolling() {
    setInterval(async () => {
      try {
        teams = await sb('teams?order=total.desc');
        updateChart(); renderRanking(); updateTotal();
      } catch(_) {}
    }, 8000);
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function init() {
    teams = await sb('teams?order=total.desc');
    buildChart(); renderRanking(); updateTotal();
    subscribeRealtime(); startPolling();
  }

  init().catch(console.error);
</script>
</body>
</html>
