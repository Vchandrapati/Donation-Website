<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @font-face {
      font-family: 'Draco';
      src: url('__DRACO_FONT__') format('opentype');
      font-weight: normal;
      font-style: normal;
      /* Draco renders much larger than the old Aeromove at the same font-size,
         so scale it down globally. Tweak this one number to taste. */
      size-adjust: 45%;
    }
* { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070d;
      --surface: #0e0e18;
      --border:  #2a2a40;
      --accent:  #29b8e8;
      --gold:    #f7c26a;
      --green:   #34d399;
      --text:    #f0f0f8;
      --muted:   #8888a8;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100%;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr 480px;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      background: #0a0a14;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      height: 80px;
      width: auto;
    }

    .header-title {
      font-family: 'Draco', 'Segoe UI', sans-serif;
      font-size: 4.2rem;
      line-height: 80px;
      color: #29b8e8;
      text-shadow: 0 0 36px #29b8e840;
      white-space: nowrap;
    }


    .header-right { text-align: right; }
    .header-right .total-amount {
      font-size: 4.8rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -1px;
      display: block;
      line-height: 1;
    }
    .header-right .total-label {
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
      display: block;
      font-weight: 600;
    }

    /* ── Body ── */
    .body {
      display: grid;
      grid-template-columns: 1fr 540px;
      min-height: 0;
    }

    /* ── Chart panel ── */
    .chart-panel {
      padding: 28px 36px 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--border);
    }

    .panel-label {
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: 18px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* ── Ranking panel ── */
    .ranking-panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 28px 28px;
      border-left: 1px solid var(--border);
    }

    .rank-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 10px;
      border-radius: 10px;
      transition: background 0.3s;
    }

    .rank-row:hover { background: #141420; }

    .rank-pos {
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rank-info { flex: 1; min-width: 0; }

    .rank-name {
      font-family: 'Draco', 'Segoe UI', sans-serif;
      font-size: 2.4rem;
      color: #e8e8f8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-amount {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--green);
      min-width: 150px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Thank-you banner ── */
    #donBanner {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%) translateY(calc(-100% - 10px));
      background: #0d0d1e;
      border: 1px solid #2a2a4a;
      border-bottom: 3px solid var(--green);
      border-radius: 0 0 20px 20px;
      padding: 20px 56px;
      z-index: 300;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      text-align: center;
      min-width: 420px;
    }
    #donBanner.show { transform: translateX(-50%) translateY(0); }
    #donBanner .b-name   { font-family:'Draco','Segoe UI',sans-serif; font-size:2.2rem; color:#29b8e8; margin-bottom:4px; }
    #donBanner .b-amount { font-size:1.4rem; font-weight:700; color:var(--green); letter-spacing:0.5px; }


    /* ── Live badge ── */
    #liveBadge {
      position: fixed;
      bottom: 20px; right: 24px;
      z-index: 50;
      border: 1px solid #34d39928;
      border-radius: 20px;
      color: #34d39960;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.55;
      transition: opacity 0.3s, border-color 0.4s, color 0.4s;
      pointer-events: none;
    }
    #liveBadge:hover { opacity: 1; pointer-events: auto; }
    #liveBadge.warn { border-color: #f59e0b28; color: #f59e0b60; }
    #liveBadge.err  { border-color: #ef444428; color: #ef444460; }
    .live-dot {
      width: 6px; height: 6px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    #liveBadge.err .live-dot { animation: none; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.25; } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }

    /* ── PIN Gate ── */
    #pinGate {
      position: fixed; inset: 0; z-index: 999;
      background: #07070d;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s;
    }
    #pinGate.hide { opacity: 0; pointer-events: none; }
    #pinBox {
      background: #0e0e18;
      border: 1px solid #2a2a40;
      border-radius: 24px;
      padding: 52px 60px;
      text-align: center;
      width: 340px;
    }
    #pinLock { font-size: 2.4rem; margin-bottom: 16px; }
    #pinTitle { font-size: 1.35rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
    #pinSub { font-size: 0.82rem; color: var(--muted); margin-bottom: 28px; }
    #pinInput {
      background: #0a0a14; border: 1px solid #2a2a40; border-radius: 10px;
      color: var(--text); font-size: 1.1rem; letter-spacing: 4px;
      padding: 12px 16px; text-align: center; width: 100%;
      outline: none; transition: border-color 0.2s;
    }
    #pinInput:focus { border-color: var(--accent); }
    #pinErr { color: #f87171; font-size: 0.8rem; height: 20px; margin: 8px 0; }
    #pinBtn {
      background: var(--accent); border: none; border-radius: 10px;
      color: #07070d; cursor: pointer; font-size: 0.9rem; font-weight: 800;
      letter-spacing: 1px; padding: 13px 0; width: 100%; margin-top: 4px;
      transition: opacity 0.2s, transform 0.1s;
    }
    #pinBtn:hover { opacity: 0.85; }
    #pinBtn:active { transform: scale(0.98); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }
    #pinBox.wrong { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<div id="pinGate">
  <div id="pinBox">
    <div id="pinLock">🔒</div>
    <div id="pinTitle">D20 FUNDRAIDER NIGHT</div>
    <div id="pinSub">Enter the event PIN to continue</div>
    <input id="pinInput" type="password" autocomplete="off" placeholder="PIN" maxlength="20">
    <div id="pinErr"></div>
    <button id="pinBtn">Unlock</button>
  </div>
</div>

  <div class="body">

    <div class="chart-panel">
      <div class="panel-label">Donations by team</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="ranking-panel">
      <div class="panel-label" style="margin-bottom:16px;">Rankings</div>
      <div class="rank-list" id="rankList"></div>

<div id="liveBadge"><span class="live-dot"></span><span id="liveLabel">LIVE</span></div>

<div id="donBanner">
  <div class="b-name"   id="bName"></div>
  <div class="b-amount" id="bAmount"></div>
</div>

<script>
  const SB_URL = '__SUPABASE_URL__';
  const SB_KEY = '__SUPABASE_KEY__';

  let teams = [];
  let chart = null;
  let lastDonationId = null;

  const PALETTE = [
    '#29b8e8','#f7c26a','#34d399','#f87171','#60a5fa',
    '#a78bfa','#fbbf24','#4ade80','#fb923c','#38bdf8',
    '#818cf8','#e879f9','#2dd4bf','#facc15','#94a3b8',
    '#c084fc','#f472b6','#fb7185','#a3e635','#22d3ee',
    '#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899',
  ];

  // ── Supabase helper ────────────────────────────────────────────────────────
  async function sb(path) {
    const h = new Headers();
    h.set('apikey',        SB_KEY);
    h.set('Authorization', `Bearer ${SB_KEY}`);
    h.set('Content-Type',  'application/json');
    const res  = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: h });
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  function sorted() {
    return [...teams].filter(t => t.show !== false).sort((a,b) => b.total - a.total);
  }

  // ── Grand total ────────────────────────────────────────────────────────────
  function updateTotal() {
    const t = teams.reduce((s,t) => s + Number(t.total||0), 0);
    document.getElementById('grandTotal').textContent = '$' + t.toLocaleString();
  }

  // ── Chart ──────────────────────────────────────────────────────────────────
  function buildChart() {
    const s = sorted();
    chart = new Chart(document.getElementById('chart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: s.map(t => t.name),
        datasets: [{
          data: s.map(t => t.total),
          backgroundColor: s.map((_,i) => PALETTE[i % PALETTE.length] + 'cc'),
          borderColor:     s.map((_,i) => PALETTE[i % PALETTE.length]),
          borderWidth: 2,
          borderRadius: 8,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a2e',
            borderColor: '#3a3a5a',
            borderWidth: 1,
            titleColor: '#ffffff',
            bodyColor: '#34d399',
            titleFont: { size: 13, weight: 'bold' },
            bodyFont: { size: 14, weight: 'bold' },
            padding: 12,
            callbacks: { label: c => ` $${c.parsed.y.toLocaleString()}` },
          },
        },
        scales: {
          x: {
            grid: { color: '#1e1e30' },
            ticks: {
              color: '#c0c0d8',
              font: { size: 18, weight: '600' },
              maxRotation: 0, minRotation: 0,
              autoSkip: false,   // always show every team's label, even on narrow/low-res screens
            },
          },
          y: {
            grid: { color: '#1e1e30' },
            ticks: {
              color: '#c0c0d8',
              font: { size: 18, weight: '600' },
              callback: v => '$' + v.toLocaleString(),
            },
            beginAtZero: true,
          },
        },
      },
    });
  }

  function updateChart() {
    if (!chart) return;
    const s = sorted();
    chart.data.labels                        = s.map(t => t.name);
    chart.data.datasets[0].data             = s.map(t => t.total);
    chart.data.datasets[0].backgroundColor  = s.map((_,i) => PALETTE[i % PALETTE.length] + 'cc');
    chart.data.datasets[0].borderColor      = s.map((_,i) => PALETTE[i % PALETTE.length]);
    chart.update('active');
  }

  // ── Medal icon ─────────────────────────────────────────────────────────────
  function medalIcon(i) {
    const colors = [
      { ring: '#f7c26a', fill: '#2a1f00', text: '#f7c26a' },
      { ring: '#c0c0d8', fill: '#1a1a28', text: '#c0c0d8' },
      { ring: '#c87941', fill: '#200e00', text: '#c87941' },
    ];
    if (i > 2) return `<span style="font-size:1.4rem;font-weight:800;color:#606080;">${i+1}</span>`;
    const { ring, fill, text } = colors[i];
    return `<svg width="54" height="54" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" fill="${fill}" stroke="${ring}" stroke-width="2.5"/>
      <text x="20" y="27" text-anchor="middle" font-size="17" font-weight="800"
            font-family="Segoe UI,system-ui,sans-serif" fill="${text}">${i+1}</text>
    </svg>`;
  }

  // ── Ranking ────────────────────────────────────────────────────────────────
  function renderRanking() {
    const s   = sorted();
    const max = s[0]?.total || 1;
    document.getElementById('rankList').innerHTML = s.map((t,i) => {
      return `
        <div class="rank-row">
          <div class="rank-pos">${medalIcon(i)}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(t.name)}</div>
          </div>
          <div class="rank-amount">$${Number(t.total).toLocaleString()}</div>
        </div>`;
    }).join('');
  }

  // ── Thank-you banner ──────────────────────────────────────────────────────
  let bannerTimer;
  function showTY(donorName, teamName, amount) {
    document.getElementById('bName').textContent   = donorName ? `Thank you ${donorName}` : 'Thank you!';
    document.getElementById('bAmount').textContent = '+$' + Number(amount).toLocaleString();
    document.getElementById('donBanner').classList.add('show');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => document.getElementById('donBanner').classList.remove('show'), 3000);
  }

  // ── Live badge ────────────────────────────────────────────────────────────
  let _wsLive = false;
  let _lastFetch = 0;

  function setLive(state) {
    const badge = document.getElementById('liveBadge');
    const label = document.getElementById('liveLabel');
    if (!badge) return;
    badge.className = state === 'warn' ? 'warn' : state === 'err' ? 'err' : '';
    label.textContent = state === 'warn' ? 'POLL' : state === 'err' ? 'OFF' : 'LIVE';
  }

  setInterval(() => {
    if (_lastFetch === 0) return;
    const age = Date.now() - _lastFetch;
    if (age > 25000) setLive('err');
    else if (!_wsLive) setLive('warn');
    else setLive('live');
  }, 6000);

  // ── Real-time ──────────────────────────────────────────────────────────────
  function subscribeRealtime() {
    const wsUrl = SB_URL.replace('https://','wss://').replace('http://','ws://');
    const ws = new WebSocket(`${wsUrl}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`);

    ws.onopen = () => {
      _wsLive = true; setLive('live');
      ws.send(JSON.stringify({
        topic: 'realtime:public:donations',
        event: 'phx_join',
        payload: { config: {
          broadcast: { self: false },
          presence: { key: '' },
          postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'donations' }],
        }},
        ref: '1',
      }));
    };

    ws.onclose = () => { _wsLive = false; setLive('warn'); };
    ws.onerror = () => { _wsLive = false; setLive('warn'); };

    ws.onmessage = async (msg) => {
      const p = JSON.parse(msg.data);
      const rec = p.payload?.data?.record;
      if (rec && rec.id > lastDonationId) {
        lastDonationId = rec.id;
        try {
          teams = await sb('teams?order=total.desc');
          updateChart(); renderRanking(); updateTotal();
          showTY(rec.donor_name, rec.team_name, rec.amount, rec.description);
        } catch(_) {}
      }
    };

    setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: null }));
      }
    }, 25000);
  }

  function startPolling() {
    setInterval(async () => {
      try {
        teams = await sb('teams?order=total.desc');
        updateChart(); renderRanking(); updateTotal();
        _lastFetch = Date.now();
        if (!_wsLive) setLive('warn');
        const latest = await sb('donations?order=created_at.desc&limit=1');
        if (latest && latest[0] && latest[0].id > lastDonationId) {
          lastDonationId = latest[0].id;
          const r = latest[0];
          showTY(r.donor_name, r.team_name, r.amount, r.description);
        }
      } catch(_) { if (!_wsLive) setLive('err'); }
    }, 8000);
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function init() {
    const [teamData, seedDonation] = await Promise.all([
      sb('teams?order=total.desc'),
      sb('donations?order=created_at.desc&limit=1&select=id'),
    ]);
    teams = teamData;
    if (seedDonation && seedDonation[0]) lastDonationId = seedDonation[0].id;
    _lastFetch = Date.now();
    buildChart(); renderRanking(); updateTotal();
    subscribeRealtime(); startPolling();
  }

  init().catch(console.error);

  // ── PIN Gate ───────────────────────────────────────────────────────────────
  (function() {
    const PIN  = '__SITE_PIN__';
    const gate = document.getElementById('pinGate');
    const input= document.getElementById('pinInput');
    const err  = document.getElementById('pinErr');
    const box  = document.getElementById('pinBox');

    if (sessionStorage.getItem('d20_pin_ok') === '1') {
      gate.style.display = 'none';
      return;
    }

    function checkPin() {
      if (input.value === PIN) {
        sessionStorage.setItem('d20_pin_ok', '1');
        gate.classList.add('hide');
        setTimeout(() => gate.remove(), 400);
      } else {
        err.textContent = 'Incorrect PIN — try again';
        input.value = '';
        input.focus();
        box.classList.remove('wrong');
        void box.offsetWidth;
        box.classList.add('wrong');
      }
    }

    document.getElementById('pinBtn').addEventListener('click', checkPin);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPin();
      err.textContent = '';
    });
    input.focus();
  })();
</script>
</body>
</html>
